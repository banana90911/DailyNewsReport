services:
  - type: web
    name: daily-news-app
    runtime: node
    plan: free
    autoDeploy: false
    buildCommand: npm ci && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_BOT_INVITE_URL
        value: https://discord.com/oauth2/authorize?client_id=1478764158538486022&permissions=2147535936&integration_type=0&scope=bot
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: FIRECRAWL_API_URL
        value: https://api.firecrawl.dev/v1
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_TTS_BUCKET
        value: tts
