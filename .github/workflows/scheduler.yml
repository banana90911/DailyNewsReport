name: Trigger Report Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call scheduler endpoint
        env:
          SCHEDULER_ENDPOINT: ${{ secrets.SCHEDULER_ENDPOINT }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$SCHEDULER_ENDPOINT" ]; then
            echo "SCHEDULER_ENDPOINT secret is required"
            exit 1
          fi

          if [ -n "$CRON_SECRET" ]; then
            curl -sS -X POST "$SCHEDULER_ENDPOINT" -H "x-cron-secret: $CRON_SECRET"
          else
            curl -sS -X POST "$SCHEDULER_ENDPOINT"
          fi
